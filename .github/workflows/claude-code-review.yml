name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  build-test-and-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout tidetree
        uses: actions/checkout@v4
        with:
          path: tidetree
          fetch-depth: 1

      # build.xml looks for beast2 at ../beast2
      - name: Checkout beast2
        uses: actions/checkout@v4
        with:
          repository: CompEvol/beast2
          ref: master
          path: beast2

      # build.xml looks for BeastFX at ../BeastFX (needed by feast)
      - name: Checkout BeastFX
        uses: actions/checkout@v4
        with:
          repository: CompEvol/BeastFX
          ref: master
          path: BeastFX

      # feast is still needed as a sibling directory
      - name: Checkout feast
        uses: actions/checkout@v4
        with:
          repository: tgvaughan/feast
          ref: master
          path: feast

      - name: Install JUnit
        run: |
          mkdir -p beast2/lib
          wget -q https://repo1.maven.org/maven2/junit/junit/4.13.2/junit-4.13.2.jar \
            -O beast2/lib/junit-4.13.2.jar
          wget -q https://repo1.maven.org/maven2/org/hamcrest/hamcrest-core/1.3/hamcrest-core-1.3.jar \
            -O beast2/lib/hamcrest-core-1.3.jar

      - name: Set up Java 17 (Zulu) with JavaFX
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          java-package: jdk+fx

      - name: Build and run tests
        working-directory: tidetree
        run: ant test

      - name: Register BEAST2 data type services
        run: |
          mkdir -p tidetree/build/META-INF/services
          # Register standard nucleotide/integer data types that Alignment.findDataTypes() needs
          cat > tidetree/build/META-INF/services/beast.base.evolution.datatype.DataType << 'EOF'
          beast.base.evolution.datatype.Nucleotide
          beast.base.evolution.datatype.IntegerData
          beast.base.evolution.datatype.Binary
          beast.base.evolution.datatype.StandardData
          beast.base.evolution.datatype.Aminoacid
          EOF

      - name: Print test reports on failure
        if: failure()
        run: cat tidetree/test-reports/*.txt

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}

            Additionally, since this is the TiDeTree BEAST2 package (a Bayesian
            phylogenetic framework for single-cell lineage tracing data), please check:
            - Any issues with the likelihood calculations, editing model, or silencing
              model that could silently produce incorrect inference results
            - New parameters are properly bounded and prior-constrained
            - Implementation is consistent with the mathematical model in comments/docs