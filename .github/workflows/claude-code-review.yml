name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  build-test-and-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout tidetree
        uses: actions/checkout@v4
        with:
          path: tidetree
          fetch-depth: 1

      # Do NOT check out beast2 or BeastFX locally — the build.xml
      # "build-remote-beast" path downloads beast2 from GitHub without
      # BeastFX, avoiding the JavaFX dependency entirely.

      # feast is still needed as a sibling directory
      - name: Checkout feast
        uses: actions/checkout@v4
        with:
          repository: tgvaughan/feast
          ref: master
          path: feast

      - name: Set up Java 17 (Zulu) with JavaFX
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          java-package: jdk+fx

      - name: Build and run tests
        working-directory: tidetree
        run: ant test

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}

            Additionally, since this is the TiDeTree BEAST2 package (a Bayesian
            phylogenetic framework for single-cell lineage tracing data), please check:
            - Any issues with the likelihood calculations, editing model, or silencing
              model that could silently produce incorrect inference results
            - New parameters are properly bounded and prior-constrained
            - Implementation is consistent with the mathematical model in comments/docs